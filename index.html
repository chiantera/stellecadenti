<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Night Sky</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      /* We handle pinch/scroll ourselves, so suppress native gestures. */
      touch-action: none;
    }

    /* The star field is larger than the screen and gets scaled on zoom,
       so zooming out shrinks the stars AND reveals more sky (no margins). */
    #stars {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 300vw;
      height: 300vh;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      will-change: transform;
    }

    /* Shooting stars live on a separate, unscaled overlay pinned to the
       viewport, so meteors always render crisply at screen scale. */
    #sky {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    /* Static, sparse stars */
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 4px 1px rgba(255, 255, 255, 0.5);
      opacity: 0.9; /* steady part of the background */
      animation: dim var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    /* Stars stay bright almost the whole cycle, with a brief dip to dark
       once in a while. Starts and ends bright, so nothing looks "missing"
       on load. */
    @keyframes dim {
      0%, 44%, 56%, 100% { opacity: 0.9; }
      50%                { opacity: 0.15; }
    }

    /* Shooting stars: a bright head with a short tapered tail */
    .shooting-star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.8);
      pointer-events: none;
    }

    .shooting-star::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 1px;
      width: 70px;
      height: 1px;
      transform: translateY(-50%);
      background: linear-gradient(to left, rgba(255, 255, 255, 0.85), transparent);
    }
  </style>
</head>
<body>
  <div id="stars"></div>
  <div id="sky"></div>

  <script>
    (function () {
      "use strict";

      var stars = document.getElementById("stars");
      var sky = document.getElementById("sky");

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      // --- Sparse field of static, gently twinkling stars ---
      // The field is 3x the viewport in each dimension (9x the area), so we
      // scale the count up to keep the same sparse density on screen.
      function createStars(count) {
        for (var i = 0; i < count; i++) {
          var s = document.createElement("div");
          s.className = "star";
          s.style.left = rand(0, 100) + "%";
          s.style.top = rand(0, 100) + "%";
          // Long cycles + staggered delays => stars only dim occasionally,
          // never all at once.
          s.style.setProperty("--dur", rand(14, 26).toFixed(2) + "s");
          s.style.setProperty("--delay", rand(0, 20).toFixed(2) + "s");
          stars.appendChild(s);
        }
      }

      // --- A single shooting star that crosses a small part of the sky ---
      function shootStar(px, py) {
        var star = document.createElement("div");
        star.className = "shooting-star";

        var x, y;
        if (px != null && py != null) {
          // Jitter around the click so it appears "right around there".
          x = px + rand(-35, 35);
          y = py + rand(-35, 35);
        } else {
          x = rand(0.05, 0.80) * window.innerWidth;  // leave room to travel
          y = rand(0.05, 0.70) * window.innerHeight;  // mostly upper portion
        }
        star.style.left = x + "px";
        star.style.top = y + "px";

        // Short, randomized diagonal travel so it only crosses a small span.
        var distance = rand(120, 220);          // px
        var angle = rand(15, 45) * Math.PI / 180; // gentle downward-right slope
        var dx = Math.cos(angle) * distance;
        var dy = Math.sin(angle) * distance;
        star.style.transform = "rotate(" + (angle * 180 / Math.PI) + "deg)";

        sky.appendChild(star);

        var duration = rand(800, 1200); // ms
        var anim = star.animate(
          [
            { transform: star.style.transform + " translate(0, 0)", opacity: 0 },
            { opacity: 1, offset: 0.15 },
            { opacity: 1, offset: 0.7 },
            { transform: star.style.transform + " translate(" + dx + "px, " + dy + "px)", opacity: 0 }
          ],
          { duration: duration, easing: "ease-out", fill: "forwards" }
        );

        // Remove from the DOM so nothing lingers ("without a trace").
        anim.onfinish = function () {
          if (star.parentNode) star.parentNode.removeChild(star);
        };
      }

      // Falling stars start frequent, then relax to the steady cadence.
      // Phases run in order; once exhausted we settle on 20–30s forever.
      var phases = [
        { min: 3000,  max: 5000,  count: 1 }, // first one within ~5s
        { min: 5000,  max: 10000, count: 2 }, // then every 5–10s
        { min: 10000, max: 20000, count: 2 }  // then every 10–20s
      ];
      var steady = { min: 20000, max: 30000 }; // then every 20–30s
      var phaseIndex = 0;
      var firedInPhase = 0;

      function nextDelay() {
        if (phaseIndex < phases.length) {
          var p = phases[phaseIndex];
          var delay = rand(p.min, p.max);
          if (++firedInPhase >= p.count) {
            phaseIndex++;
            firedInPhase = 0;
          }
          return delay;
        }
        return rand(steady.min, steady.max);
      }

      function scheduleNext() {
        setTimeout(function () {
          shootStar();
          // Once in a while a few cross the sky at the same time.
          if (Math.random() < 0.3) {
            var extra = 1 + Math.floor(rand(0, 2)); // 1–2 more
            for (var i = 0; i < extra; i++) {
              setTimeout(function () { shootStar(); }, rand(60, 350));
            }
          }
          scheduleNext();
        }, nextDelay());
      }

      // --- Custom zoom: pull back to reveal more sky and shrink the stars.
      // Done in JS so it behaves identically everywhere, including Chrome on
      // Android (which clamps native pinch-to-zoom-out at width=device-width).
      var MIN_ZOOM = 0.4;
      var MAX_ZOOM = 3;
      var zoom = 1;

      function applyZoom() {
        stars.style.transform = "translate(-50%, -50%) scale(" + zoom + ")";
      }

      function setZoom(z) {
        zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, z));
        applyZoom();
      }

      // Mouse wheel / trackpad pinch (trackpad pinch arrives as ctrl+wheel).
      window.addEventListener("wheel", function (e) {
        e.preventDefault();
        setZoom(zoom * (1 - e.deltaY * 0.0015));
      }, { passive: false });

      // Touch pinch.
      var pinchStartDist = 0;
      var pinchStartZoom = 1;

      function touchDist(t) {
        var dx = t[0].clientX - t[1].clientX;
        var dy = t[0].clientY - t[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }

      window.addEventListener("touchstart", function (e) {
        if (e.touches.length === 2) {
          pinchStartDist = touchDist(e.touches);
          pinchStartZoom = zoom;
        }
      }, { passive: false });

      window.addEventListener("touchmove", function (e) {
        if (e.touches.length === 2 && pinchStartDist > 0) {
          e.preventDefault();
          setZoom(pinchStartZoom * (touchDist(e.touches) / pinchStartDist));
        }
      }, { passive: false });

      window.addEventListener("touchend", function (e) {
        if (e.touches.length < 2) pinchStartDist = 0;
      });

      // Fullscreen can't be forced on load — browsers require a user
      // gesture. So a click/tap anywhere toggles it. (Esc also exits.)
      function toggleFullscreen() {
        var doc = document;
        var el = doc.documentElement;
        var isFs = doc.fullscreenElement || doc.webkitFullscreenElement;
        if (!isFs) {
          var req = el.requestFullscreen || el.webkitRequestFullscreen;
          if (req) req.call(el);
        } else {
          var exit = doc.exitFullscreen || doc.webkitExitFullscreen;
          if (exit) exit.call(doc);
        }
      }
      document.addEventListener("click", function (e) {
        toggleFullscreen();
        // Send a shooting star around where they clicked, after a short delay.
        var x = e.clientX, y = e.clientY;
        setTimeout(function () { shootStar(x, y); }, rand(300, 700));
      });

      createStars(400);
      scheduleNext();
    })();
  </script>
</body>
</html>
